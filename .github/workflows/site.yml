name: Publish Dokka docs + Coverage to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: { }

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests + coverage reports
        run: >
          ./gradlew :euc-ble-core:testDebugUnitTest
          --tests io.github.tritbool.euc.ble.AllTests
          :euc-ble-core:jacocoTestReport
          :euc-ble-core:jacocoFocusedReport
          -PmaxParallelForks=1
          --no-daemon
        env:
          CI: true

      - name: Generate Dokka HTML
        run: ./gradlew :euc-ble-core:dokkaGeneratePublicationHtml --no-daemon
        env:
          CI: true

      - name: Build Jekyll site (home page)
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Copy Dokka + JaCoCo into Jekyll build output
        run: |
          sudo mkdir -p _site/api
          sudo mkdir -p _site/test-coverage/full
          sudo mkdir -p _site/test-coverage/focused
          sudo cp -r euc-ble-core/build/dokka/html/* _site/api/
          sudo cp -r euc-ble-core/build/reports/jacoco/full/html/* _site/test-coverage/full/
          sudo cp -r euc-ble-core/build/reports/jacoco/focused/html/* _site/test-coverage/focused/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
