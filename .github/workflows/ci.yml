name: CI – Unit Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests + coverage reports
        run: >
          ./gradlew :euc-ble-core:testDebugUnitTest
          --tests
          io.github.tritbool.euc.ble.AllTests
          :euc-ble-core:jacocoTestReport
          :euc-ble-core:jacocoFocusedReport
          -PmaxParallelForks=1
          --no-daemon
          --stacktrace
          -Dkotlinx.coroutines.io.parallelism=4
        env:
          GRADLE_OPTS: "-Xmx2g -Dfile.encoding=UTF-8"
          CI: "true"

      - name: Coverage summary (protocols/models/frames)
        if: always()
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          focused_report = Path("euc-ble-core/build/reports/jacoco/focused/jacoco.xml")
          full_report    = Path("euc-ble-core/build/reports/jacoco/full/jacoco.xml")
          summary = Path(".coverage-summary.md")

          if not focused_report.exists():
              summary.write_text(
                  "## Coverage (protocols/models/frames)\n\n"
                  "Coverage XML not found at "
                  "`euc-ble-core/build/reports/jacoco/focused/jacoco.xml`.\n"
                  "Ensure `:euc-ble-core:jacocoFocusedReport` completed successfully.\n"
              )
              raise SystemExit(0)

          def ratio(root, counter_type):
              covered, missed = 0, 0
              for pkg in root.findall("package"):
                  for c in pkg.findall("counter"):
                      if c.attrib.get("type") == counter_type:
                          covered += int(c.attrib.get("covered", "0"))
                          missed  += int(c.attrib.get("missed",  "0"))
              total = covered + missed
              return covered, missed, (covered / total * 100.0) if total else 0.0

          def pkg_ratio(pkg, counter_type):
              for c in pkg.findall("counter"):
                  if c.attrib.get("type") == counter_type:
                      cov  = int(c.attrib.get("covered", "0"))
                      miss = int(c.attrib.get("missed",  "0"))
                      tot  = cov + miss
                      return cov, miss, (cov / tot * 100.0) if tot else 0.0
              return 0, 0, 0.0

          focused_root = ET.parse(focused_report).getroot()
          lines    = ratio(focused_root, "LINE")
          branches = ratio(focused_root, "BRANCH")

          out = [
              "## Coverage (protocols/models/frames)\n",
              f"- Line coverage: **{lines[2]:.2f}%** ({lines[0]} covered / {lines[1]} missed)",
              f"- Branch coverage: **{branches[2]:.2f}%** ({branches[0]} covered / {branches[1]} missed)",
              "- Full report: `euc-ble-core/build/reports/jacoco/full/html/index.html`",
              "- Focused report: `euc-ble-core/build/reports/jacoco/focused/html/index.html`",
              "",
              "### Per-package breakdown (focused)",
              "",
              "| Package | Line % | Lines (cov/miss) | Branch % | Branches (cov/miss) |",
              "|---------|-------:|-----------------|----------:|--------------------|",
          ]

          pkgs = sorted(focused_root.findall("package"), key=lambda p: p.attrib.get("name", ""))
          for pkg in pkgs:
              name = pkg.attrib.get("name", "").replace("com/euc/ble/", "").replace("/", ".")
              if not name:
                  name = "(root)"
              lc = pkg_ratio(pkg, "LINE")
              bc = pkg_ratio(pkg, "BRANCH")
              out.append(
                  f"| `{name}` | {lc[2]:.1f}% | {lc[0]}/{lc[1]} | {bc[2]:.1f}% | {bc[0]}/{bc[1]} |"
              )

          if full_report.exists():
              full_root = ET.parse(full_report).getroot()
              fl = ratio(full_root, "LINE")
              fb = ratio(full_root, "BRANCH")
              out += [
                  "",
                  "### Full module coverage",
                  "",
                  f"- Line coverage: **{fl[2]:.2f}%** ({fl[0]} covered / {fl[1]} missed)",
                  f"- Branch coverage: **{fb[2]:.2f}%** ({fb[0]} covered / {fb[1]} missed)",
              ]

          summary.write_text("\n".join(out) + "\n")
          PY
          cat .coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            euc-ble-core/build/reports/tests/
            euc-ble-core/build/reports/jacoco/
          retention-days: 7
