name: CI – Unit Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: >
          ./gradlew :euc-ble-core:testDebugUnitTest
          --no-daemon
          --stacktrace
          -Dkotlinx.coroutines.io.parallelism=4
          -PmaxParallelForks=1
        env:
          GRADLE_OPTS: "-Xmx2g -Dfile.encoding=UTF-8"
          CI: "true"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: euc-ble-core/build/reports/tests/
          retention-days: 7
