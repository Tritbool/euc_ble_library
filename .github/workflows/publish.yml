name: Publish to Maven Central

on:
  release:
    types: [published]   # déclenché quand un Release (ou Pre-release) est publié

jobs:
  publish:
    runs-on: ubuntu-latest
    # Si un jour tu veux exclure les pre-releases :
    # if: "!github.event.release.prerelease"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests + coverage reports
        run: >
          ./gradlew :euc-ble-core:testDebugUnitTest
          --tests io.github.tritbool.euc.ble.AllTests
          :euc-ble-core:jacocoTestReport
          :euc-ble-core:jacocoFocusedReport
          -PmaxParallelForks=1
          --no-daemon
          --stacktrace
          -Dkotlinx.coroutines.io.parallelism=4
        env:
          CI: true

      - name: Publish to Maven Central
        run: >
          ./gradlew :euc-ble-core:publishAllPublicationsToMavenCentralRepository
          --no-daemon
          --stacktrace
        env:
          CI: true
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_SIGNING_KEY_ID }}